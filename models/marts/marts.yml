version: 2

models:
  - name: dim_customers
    description: "{{ doc('dim_customers_overview') }}"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - customer_id
              - customer_email

    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
          
      - name: total_orders
        description: "Total pesanan pelanggan."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              
      - name: customer_email
        tests:
          - not_null