name: 'enterprise_dbt'
version: '1.0.0'
config-version: 2

# Mengarahkan dbt untuk mencari profil bernama 'enterprise_dbt' di profiles.yml
profile: 'enterprise_dbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Konfigurasi Model berdasarkan Layering Target Arsitektur
models:
  enterprise_dbt:
    # ------------------------------------------------------------------
    # BRONZE LAYER (Staging) -> Materialization: VIEW
    # ------------------------------------------------------------------
    staging:
      +materialized: view
      +schema: staging

    # ------------------------------------------------------------------
    # SILVER LAYER (Intermediate) -> Materialization: INCREMENTAL
    # ------------------------------------------------------------------
    intermediate:
      +materialized: incremental
      +schema: intermediate
      # Strategi inkremental untuk PostgreSQL (merge/delete+insert)
      +incremental_strategy: delete+insert
      +unique_key: order_id

    # ------------------------------------------------------------------
    # GOLD LAYER (Marts) -> Materialization: TABLE
    # ------------------------------------------------------------------
    marts:
      +materialized: table
      +schema: marts